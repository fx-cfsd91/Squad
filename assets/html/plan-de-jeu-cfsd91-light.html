<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080D14">
<title>CFSD91 · Plan de jeu</title>
<style>
  :root{
    --bg:#0C1118;--bg-line:#1A2330;--card:#151D29;--card-edge:#26313F;
    --ink:#EAF0F7;--ink-soft:#8FA0B5;--panel:#111823;--header:#080D14;
    --accent:#E5484D;--path:#FF3B30;--ok:#22C55E;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--ink);display:flex;flex-direction:column;touch-action:none;
  }
  header{
    background:var(--header);padding:10px 14px;
    padding-top:calc(10px + env(safe-area-inset-top));
    display:flex;align-items:center;gap:10px;border-bottom:1px solid #1B2430;flex:0 0 auto;z-index:20;
  }
  .beltlogo{width:40px;height:13px;border-radius:3px;background:#000;position:relative;flex:0 0 auto;box-shadow:inset 0 0 0 1px rgba(255,255,255,.3)}
  .beltlogo::after{content:"";position:absolute;right:5px;top:0;bottom:0;width:12px;background:var(--accent)}
  .beltlogo span{position:absolute;top:2px;bottom:2px;width:2px;background:#fff}
  .beltlogo span:nth-child(1){right:7px}.beltlogo span:nth-child(2){right:10px}.beltlogo span:nth-child(3){right:13px}
  h1{font-size:14px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;line-height:1.15}
  h1 small{display:block;font-size:9px;font-weight:600;letter-spacing:.2em;color:#5E7188}
  .spacer{flex:1}
  .hbtn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:#fff;border-radius:9px;padding:8px 12px;font-size:14px;font-weight:700}
  .tip{font-size:10.5px;color:#5E7188;text-align:center;padding:5px 8px;background:var(--panel);border-bottom:1px solid #1B2430;flex:0 0 auto}

  #stage{flex:1;position:relative;overflow:hidden}
  svg{width:100%;height:100%;display:block;touch-action:none}

  .node .body{fill:var(--card);stroke:var(--card-edge);stroke-width:1}
  .node text{font-size:13px;font-weight:700;fill:var(--ink);pointer-events:none}
  .node .cat-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;pointer-events:none}
  .node .meta{font-size:9.5px;fill:var(--ink-soft);pointer-events:none}
  .node.dim{opacity:.12}
  .node.path-start .body{stroke:var(--path);stroke-width:3}
  .node.path-on .body{stroke:var(--ok);stroke-width:2.4}
  .edge{fill:none;stroke:#3D4C5F;stroke-width:2;pointer-events:none}
  .edge.dim{opacity:.08}
  .edge.path{stroke:var(--path);stroke-width:4.2}

  .fabs{position:absolute;right:12px;bottom:calc(16px + env(safe-area-inset-bottom));z-index:15}
  .fab{width:48px;height:48px;border-radius:50%;border:1px solid var(--card-edge);background:#1A2432;color:var(--ink);font-size:20px;font-weight:800;box-shadow:0 4px 16px rgba(0,0,0,.5)}
  .fab:active{transform:scale(.94)}

  /* Pastille lignée : seul élément affiché en mode cheminement */
  .chip{
    position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:18;
    display:none;align-items:center;gap:10px;max-width:94%;
    background:var(--panel);border:1.5px solid var(--path);border-radius:999px;
    padding:8px 8px 8px 14px;box-shadow:0 4px 16px rgba(0,0,0,.5);
  }
  .chip.open{display:flex}
  .chip .t{font-size:12.5px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .chip .t b{color:var(--path)}
  .chip button{
    width:30px;height:30px;border-radius:50%;border:none;flex:0 0 auto;
    background:var(--path);color:#fff;font-size:14px;font-weight:800;
  }

  .toast{
    position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:30;
    background:#E8EDF3;color:#0C1118;padding:8px 15px;border-radius:999px;
    font-size:12.5px;font-weight:700;opacity:0;transition:opacity .25s;pointer-events:none;
    max-width:92%;text-align:center;
  }
  .toast.show{opacity:1}
</style>
</head>
<body>

<header>
  <div class="beltlogo"><span></span><span></span><span></span></div>
  <h1>Plan de jeu<small>CFSD91 · MMA no-gi</small></h1>
  <div class="spacer"></div>
  <button class="hbtn" id="btnFit">⌖</button>
</header>
<div class="tip"><b>Double-touche</b> une technique : sa lignée s'affiche en rouge</div>

<div id="stage">
  <svg id="svg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="tatami" width="80" height="80" patternUnits="userSpaceOnUse">
        <rect width="80" height="80" fill="var(--bg)"/>
        <path d="M 80 0 L 0 0 0 80" fill="none" stroke="var(--bg-line)" stroke-width="1"/>
      </pattern>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#3D4C5F"/>
      </marker>
      <marker id="arrowPath" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--path)"/>
      </marker>
    </defs>
    <rect x="-8000" y="-8000" width="16000" height="16000" fill="url(#tatami)"/>
    <g id="world">
      <g id="edges"></g>
      <g id="nodes"></g>
    </g>
  </svg>

  <div class="chip" id="chip">
    <span class="t" id="chipText"></span>
    <button id="chipClose">✕</button>
  </div>
  <div class="fabs"><button class="fab" id="btnFit2">⌖</button></div>
  <div class="toast" id="toast"></div>
</div>

<script>
"use strict";
const DATA = {"nodes":[{"id":"n101","name":"O-goshi","cat":"debout","belt":"blanche","pos":"Debout","mode":"attaque","note":"Grande bascule de hanche","x":-781.8576706098039,"y":-11.649931543746604},{"id":"n104","name":"O-soto-gari","cat":"debout","belt":"blanche","pos":"Debout","mode":"attaque","note":"Grand fauchage extérieur","x":-778.0082666460221,"y":-131.5363427137057},{"id":"n105","name":"O-soto-otoshi","cat":"debout","belt":"jaune","pos":"Debout","mode":"attaque","note":"","x":-772.8960401192521,"y":846.4382613991216},{"id":"n106","name":"O-uchi-gari","cat":"debout","belt":"jaune","pos":"Debout","mode":"attaque","note":"Grand fauchage intérieur","x":-794.5102918612062,"y":1033.7473158665507},{"id":"n107","name":"Ko-uchi-gari","cat":"debout","belt":"jaune","pos":"Debout","mode":"attaque","note":"Petit fauchage intérieur","x":-741.0949391531856,"y":470.73442908219926},{"id":"n113","name":"Ippon-seoi-nage","cat":"debout","belt":"orange","pos":"Debout","mode":"attaque","note":"Épaule à un bras","x":-767.5257199527011,"y":94.46212824813853},{"id":"n116","name":"Uchi-mata","cat":"debout","belt":"bleue","pos":"Debout","mode":"attaque","note":"Fauchage intérieur de cuisse","x":-772.6979573169176,"y":772.0381257682817},{"id":"n123","name":"Kuchiki-taoshi","cat":"debout","belt":"orange","pos":"Debout","mode":"attaque","note":"Saisie de jambe directe","x":-759.8098896935743,"y":697.0662689127481},{"id":"n124","name":"Kibisu-gaeshi","cat":"debout","belt":"verte","pos":"Debout","mode":"attaque","note":"Saisie du talon","x":-754.6524002192444,"y":545.0569159116156},{"id":"n125","name":"Double leg","cat":"debout","belt":"blanche","pos":"Debout","mode":"attaque","note":"Changement de niveau, tête à l'extérieur","x":-771.7067312536561,"y":194.8107559876642},{"id":"n127","name":"Single leg","cat":"debout","belt":"blanche","pos":"Debout","mode":"attaque","note":"Jambe capturée, tête à l'intérieur","x":-769.0870302080107,"y":293.4717392765211},{"id":"n130","name":"Ankle pick","cat":"debout","belt":"blanche","pos":"Debout","mode":"attaque","note":"Contrôle de la cheville","x":-752.1434876401637,"y":-80.25841771507613}],"edges":[{"from":"n104","to":"n107"},{"from":"n107","to":"n123"},{"from":"n123","to":"n124"},{"from":"n125","to":"n127"},{"from":"n127","to":"n130"},{"from":"n101","to":"n104"},{"from":"n113","to":"n125"},{"from":"n116","to":"n123"},{"from":"n106","to":"n116"}]};

const CATS = {
  debout:{label:"Debout",hex:"#7C8DA3"}, garde:{label:"Garde",hex:"#4C8DFF"},
  passage:{label:"Passage",hex:"#F2A33C"}, controle:{label:"Contrôle",hex:"#9B6DFF"},
  renversement:{label:"Renversement",hex:"#2ECC8F"}, soumission:{label:"Soumission",hex:"#FF5A60"},
  frappe:{label:"Frappe",hex:"#E86BD3"}
};
const BELTS=[["blanche","#F2F2F2"],["grise","#9AA4B0"],["jaune","#F5C518"],["orange","#F97316"],
["verte","#22C55E"],["bleue","#3B82F6"],["violette","#8B5CF6"],["marron","#8B5A2B"],["noire","#1B1B1B"]];
const beltHex = k => (BELTS.find(b=>b[0]===k)||BELTS[0])[1];

const nodes = DATA.nodes, edges = DATA.edges;
const byId = {}; nodes.forEach(n=>byId[n.id]=n);
const esc = s => String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':'&quot;','\'':'&#39;'}[c]));
function nodeSize(n){ return {w:Math.max(104,Math.min(230,n.name.length*7.6+44)), h:56}; }

/* ---- Routage des flèches (ancrages répartis, arrivée perpendiculaire) ---- */
function sideOf(n,o){const{w,h}=nodeSize(n);const dx=o.x-n.x,dy=o.y-n.y;
  return Math.abs(dx)*h>=Math.abs(dy)*w ? (dx>=0?"right":"left") : (dy>=0?"bottom":"top");}
function sideOrder(n,o,s){return (s==="left"||s==="right")
  ? Math.atan2(o.y-n.y,Math.abs(o.x-n.x)+1) : Math.atan2(o.x-n.x,Math.abs(o.y-n.y)+1);}
function computeGeo(){
  const slots=new Map(), valid=[];
  edges.forEach((e,i)=>{
    const a=byId[e.from], b=byId[e.to]; if(!a||!b) return;
    valid.push({i,a,b,sa:sideOf(a,b),sb:sideOf(b,a)});
  });
  valid.forEach(({i,a,b,sa,sb})=>{
    if(!slots.has(a.id)) slots.set(a.id,{left:[],right:[],top:[],bottom:[]});
    if(!slots.has(b.id)) slots.set(b.id,{left:[],right:[],top:[],bottom:[]});
    slots.get(a.id)[sa].push({key:i+":f",order:sideOrder(a,b,sa)});
    slots.get(b.id)[sb].push({key:i+":t",order:sideOrder(b,a,sb)});
  });
  const anchor=new Map();
  slots.forEach((sides,id)=>{
    const n=byId[id], {w,h}=nodeSize(n);
    Object.entries(sides).forEach(([side,list])=>{
      list.sort((u,v)=>u.order-v.order);
      list.forEach((s,i)=>{
        const t=(i+1)/(list.length+1); let x,y;
        if(side==="left"){x=n.x-w/2;y=n.y-h/2+h*t;}
        else if(side==="right"){x=n.x+w/2;y=n.y-h/2+h*t;}
        else if(side==="top"){y=n.y-h/2;x=n.x-w/2+w*t;}
        else {y=n.y+h/2;x=n.x-w/2+w*t;}
        anchor.set(s.key,{x,y,side});
      });
    });
  });
  const dir=s=>s==="left"?{x:-1,y:0}:s==="right"?{x:1,y:0}:s==="top"?{x:0,y:-1}:{x:0,y:1};
  const geo=new Map();
  valid.forEach(({i})=>{
    const p1=anchor.get(i+":f"), p2=anchor.get(i+":t"); if(!p1||!p2) return;
    const d1=dir(p1.side), d2=dir(p2.side);
    const ex=p2.x+d2.x*5, ey=p2.y+d2.y*5;
    const c=Math.min(140,Math.max(34,Math.hypot(ex-p1.x,ey-p1.y)*0.4));
    geo.set(i,`M ${p1.x} ${p1.y} C ${p1.x+d1.x*c} ${p1.y+d1.y*c}, ${ex+d2.x*c} ${ey+d2.y*c}, ${ex} ${ey}`);
  });
  return geo;
}
const GEO = computeGeo();

/* ---- Rendu ---- */
const svg=document.getElementById("svg"), world=document.getElementById("world");
const gE=document.getElementById("edges"), gN=document.getElementById("nodes");
let pan={x:12,y:12}, scale=1, lineage=null; // lineage={set:Set(ids), edgeIdx:Set, startId}

function render(){
  world.setAttribute("transform",`translate(${pan.x},${pan.y}) scale(${scale})`);
  gE.innerHTML=""; gN.innerHTML="";
  edges.forEach((e,i)=>{
    const d=GEO.get(i); if(!d) return;
    const p=document.createElementNS("http://www.w3.org/2000/svg","path");
    let cls="edge", mk="url(#arrow)";
    if(lineage){ if(lineage.edgeIdx.has(i)){cls+=" path";mk="url(#arrowPath)";} else cls+=" dim"; }
    p.setAttribute("d",d); p.setAttribute("class",cls); p.setAttribute("marker-end",mk);
    gE.appendChild(p);
  });
  nodes.forEach(n=>{
    const {w,h}=nodeSize(n);
    const g=document.createElementNS("http://www.w3.org/2000/svg","g");
    let cls="node";
    if(lineage){
      if(!lineage.set.has(n.id)) cls+=" dim";
      else if(n.id===lineage.startId) cls+=" path-start";
      else cls+=" path-on";
    }
    g.setAttribute("class",cls);
    g.setAttribute("transform",`translate(${n.x-w/2},${n.y-h/2})`);
    g.dataset.node=n.id;
    const c=CATS[n.cat]||CATS.garde;
    g.innerHTML=`
      <rect class="body" width="${w}" height="${h}" rx="12"></rect>
      <circle cx="16" cy="15" r="4.5" fill="${c.hex}"></circle>
      <text class="cat-label" x="26" y="18" fill="${c.hex}">${esc(c.label)}</text>
      <text class="meta" x="${w-14}" y="18" text-anchor="end">${n.mode==="defense"?"🛡":"⚔"}</text>
      <text x="13" y="37">${esc(n.name)}</text>
      <rect x="10" y="${h-10}" width="${w-20}" height="5" rx="2.5" fill="${beltHex(n.belt)}" stroke="rgba(255,255,255,.25)" stroke-width="0.6"></rect>`;
    gN.appendChild(g);
  });
}
function updateWorld(){ world.setAttribute("transform",`translate(${pan.x},${pan.y}) scale(${scale})`); }
function fit(){
  if(!nodes.length) return;
  const xs=nodes.map(n=>n.x), ys=nodes.map(n=>n.y), {w,h}=nodeSize(nodes[0]);
  const minX=Math.min(...xs)-w/2-40, maxX=Math.max(...xs)+w/2+40;
  const minY=Math.min(...ys)-h/2-40, maxY=Math.max(...ys)+h/2+40;
  const vw=svg.clientWidth, vh=svg.clientHeight;
  const sx=vw/(maxX-minX), sy=vh/(maxY-minY);
  scale=Math.min(1.05,Math.max(0.18,Math.min(sx,sy)));
  pan.x=(vw-(minX+maxX)*scale)/2; pan.y=(vh-(minY+maxY)*scale)/2;
  updateWorld();
}

/* ---- Lignée (double-touche) : amont + aval, sans tableau ---- */
const outMap=new Map(), inMap=new Map();
edges.forEach((e,i)=>{
  if(!outMap.has(e.from)) outMap.set(e.from,[]);
  outMap.get(e.from).push(e.to);
  if(!inMap.has(e.to)) inMap.set(e.to,[]);
  inMap.get(e.to).push(e.from);
});
function startLineage(id){
  const start=byId[id]; if(!start) return;
  const walk=(seed,map)=>{
    const seen=new Set(), q=[seed];
    while(q.length){
      const cur=q.shift();
      (map.get(cur)||[]).forEach(nx=>{
        if(nx!==id && !seen.has(nx)){ seen.add(nx); q.push(nx); }
      });
    }
    return seen;
  };
  const ancestors=walk(id,inMap), descendants=walk(id,outMap);
  const set=new Set([id,...ancestors,...descendants]);
  if(set.size===1){ toast("Pas de liaisons depuis cette technique"); return; }
  const edgeIdx=new Set();
  edges.forEach((e,i)=>{ if(set.has(e.from)&&set.has(e.to)) edgeIdx.add(i); });
  lineage={set,edgeIdx,startId:id};
  document.getElementById("chipText").innerHTML=`Lignée <b>« ${esc(start.name)} »</b> · ${set.size} techniques`;
  document.getElementById("chip").classList.add("open");
  render();
}
function stopLineage(){
  lineage=null;
  document.getElementById("chip").classList.remove("open");
  render();
}
document.getElementById("chipClose").onclick=stopLineage;

/* ---- Gestes : pan / pinch / double-touche ---- */
const pointers=new Map();
let dragStart=null, moved=false, pinch=null, lastTap={id:null,t:0}, downNode=null;
svg.addEventListener("pointerdown",ev=>{
  svg.setPointerCapture(ev.pointerId);
  pointers.set(ev.pointerId,{x:ev.clientX,y:ev.clientY});
  if(pointers.size===2){
    const p=[...pointers.values()];
    pinch={d:Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y),scale,pan:{...pan},
           mid:{x:(p[0].x+p[1].x)/2,y:(p[0].y+p[1].y)/2}};
    dragStart=null; downNode=null; return;
  }
  moved=false;
  const el=ev.target.closest(".node");
  downNode = el ? el.dataset.node : null;
  dragStart={px:ev.clientX,py:ev.clientY,panx:pan.x,pany:pan.y};
});
svg.addEventListener("pointermove",ev=>{
  if(!pointers.has(ev.pointerId)) return;
  pointers.set(ev.pointerId,{x:ev.clientX,y:ev.clientY});
  if(pointers.size===2&&pinch){
    const p=[...pointers.values()];
    const d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
    const mid={x:(p[0].x+p[1].x)/2,y:(p[0].y+p[1].y)/2};
    const k=Math.min(2.2,Math.max(0.18,pinch.scale*d/pinch.d));
    pan.x=mid.x-(pinch.mid.x-pinch.pan.x)*(k/pinch.scale);
    pan.y=mid.y-(pinch.mid.y-pinch.pan.y)*(k/pinch.scale);
    scale=k; updateWorld(); return;
  }
  if(!dragStart) return;
  const dx=ev.clientX-dragStart.px, dy=ev.clientY-dragStart.py;
  if(Math.abs(dx)+Math.abs(dy)>7) moved=true;
  pan.x=dragStart.panx+dx; pan.y=dragStart.pany+dy; updateWorld();
});
svg.addEventListener("pointerup",ev=>{
  pointers.delete(ev.pointerId);
  if(pointers.size<2) pinch=null;
  if(!moved&&dragStart){
    if(downNode){
      const id=downNode, now=Date.now();
      if(lastTap.id===id && now-lastTap.t<400){ lastTap={id:null,t:0}; startLineage(id); }
      else lastTap={id,t:now};
    } else if(lineage){
      stopLineage();  // toucher le fond quitte la lignée
    }
  }
  dragStart=null; downNode=null;
});
svg.addEventListener("pointercancel",ev=>{pointers.delete(ev.pointerId);dragStart=null;pinch=null;});
svg.addEventListener("wheel",ev=>{
  ev.preventDefault();
  const k=Math.min(2.2,Math.max(0.18,scale*(ev.deltaY<0?1.1:0.9)));
  pan.x=ev.clientX-(ev.clientX-pan.x)*(k/scale);
  pan.y=ev.clientY-(ev.clientY-pan.y)*(k/scale);
  scale=k; updateWorld();
},{passive:false});

document.getElementById("btnFit").onclick=fit;
document.getElementById("btnFit2").onclick=fit;

/* ---- Divers ---- */
let toastTimer=null;
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),2000);
}

fit();
render();
</script>
</body>
</html>
